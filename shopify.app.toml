# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2306fcd511592e435b9b26ac07304811"
name = "Miko Product Rentals"
application_url = "https://miko-product-rentals-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_draft_orders,write_draft_orders"

[auth]
redirect_urls = [
  "https://miko-product-rentals-production.up.railway.app/auth/callback",
  "http://localhost:3000/auth/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app_subscriptions/update"
  topics = ["app_subscriptions/update"]

  # Creates a rental booking the moment an order with rental line items is paid.
  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/paid"
  topics = ["orders/paid"]

  # Cancels the matching booking when its order is cancelled.
  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = ["orders/cancelled"]

  # Mandatory privacy and compliance webhooks for App Store listing.
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = ["shop/redact"]


[build]
automatically_update_urls_on_dev = false
dev_store_url = "pratham-testing-store.myshopify.com"
